<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hi, I'm Gerardo.</title>
<style>
  :root {
    --bg: #fdfdfc;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --accent: #ff6a0f;
    --rule: #e8e6e2;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }

  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 64px 24px 64px;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: nowrap;
    gap: 24px;
    margin-bottom: 32px;
  }

  .topbar h1 {
    margin: 0;
    flex: 1 1 auto;
    min-width: 0;
  }

  .topbar .switch {
    flex: 0 0 auto;
  }

  .switch {
    display: inline-flex;
    margin-bottom: 0;
    border: 1px solid var(--rule);
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
  }

  .switch a {
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    color: var(--text-muted);
    padding: 6px 16px;
    border-radius: 999px;
    transition: color .15s ease, background .15s ease;
  }

  .switch a:hover { color: var(--text); }

  .switch .disabled {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    padding: 6px 16px;
    border-radius: 999px;
    opacity: 0.4;
    cursor: not-allowed;
  }

  .switch a.active {
    color: #fff;
    background: var(--accent);
  }

  h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin: 0 0 32px;
  }

  .bio {
    font-size: 17px;
    color: var(--text);
    max-width: 520px;
    padding-top: 20px;
  }

  .bio p {
    margin: 0 0 20px;
  }

  .bio a {
    color: var(--accent);
    text-decoration: none;
  }

  .bio a:hover {
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  footer {
    margin-top: 64px;
    font-size: 14px;
    color: var(--text-muted);
  }

  footer a {
    color: var(--text);
    text-decoration: none;
    border-bottom: 1px solid var(--rule);
  }

  footer a:hover {
    border-bottom-color: var(--text);
  }

  @media (max-width: 480px) {
    .wrap { padding: 40px 20px 48px; }
    h1 { font-size: 24px; }
    .bio { font-size: 16px; }
    .topbar { gap: 12px; align-items: baseline; }
    .switch a { padding: 5px 11px; font-size: 13px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <h1>Hi, I'm Gerardo.</h1>
      <nav class="switch">
        <a href="index.html" class="active">Bio</a>
        <a href="built.html">Built</a>
        <a href="today.html">Today</a>
        <span class="disabled" aria-disabled="true">Experience</span>
      </nav>
    </header>

    <div class="bio">
      <p>I'm a designer based in Brooklyn. I currently lead the design of experiential marketing at <a href="https://amplify.com" target="_blank" rel="noopener">Amplify.com</a>.</p>
      <p>On my spare time I like to point at chairs, doodle, and look for cheap plane tickets to Paris.</p>
    </div>

    <footer>
      <a href="https://instagram.com/thegerardoguide" target="_blank" rel="noopener">@thegerardoguide</a>
    </footer>
  </div>
</body>
</html>
