<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Some things I've built</title>
<style>
  :root {
    --bg: #fdfdfc;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --accent: #ff6a0f;
    --rule: #e8e6e2;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }

  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 64px 24px 64px;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: nowrap;
    gap: 24px;
    margin-bottom: 32px;
  }

  .topbar h1 {
    margin: 0;
    flex: 1 1 auto;
    min-width: 0;
  }

  .topbar .switch {
    flex: 0 0 auto;
  }

  .switch {
    display: inline-flex;
    margin-bottom: 0;
    border: 1px solid var(--rule);
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
  }

  .switch a {
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    color: var(--text-muted);
    padding: 6px 16px;
    border-radius: 999px;
    transition: color .15s ease, background .15s ease;
  }

  .switch a:hover { color: var(--text); }

  .switch a.active {
    color: #fff;
    background: var(--accent);
  }

  h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin: 0 0 48px;
  }

  .projects {
    display: flex;
    flex-direction: column;
  }

  .project {
    padding: 20px 0;
  }

  .project-title {
    display: inline-block;
    font-size: 17px;
    font-weight: 600;
    text-decoration: none;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .project-title:hover {
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .project-desc {
    display: block;
    font-size: 15px;
    color: var(--text-muted);
    max-width: 480px;
  }

  footer {
    margin-top: 64px;
    font-size: 14px;
    color: var(--text-muted);
  }

  footer a {
    color: var(--text);
    text-decoration: none;
    border-bottom: 1px solid var(--rule);
  }

  footer a:hover {
    border-bottom-color: var(--text);
  }

  @media (max-width: 480px) {
    .wrap { padding: 40px 20px 48px; }
    h1 { font-size: 24px; }
    .topbar { gap: 12px; }
    .switch a { padding: 5px 11px; font-size: 13px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <h1>Some things I've built</h1>
      <nav class="switch">
        <a href="index.html">Bio</a>
        <a href="built.html" class="active">Built</a>
        <a href="experience.html">Experience</a>
      </nav>
    </header>

    <div class="projects">
      <div class="project">
        <a class="project-title" href="https://brooklyndesignarchive.github.io/inkboiler300/" target="_blank" rel="noopener">Ink Boiler 300</a>
        <span class="project-desc">A browser-based tool for generating ink boil animations.</span>
      </div>

      <div class="project">
        <a class="project-title" href="https://brooklyndesignarchive.github.io/chair-archive/" target="_blank" rel="noopener">Chair Archive</a>
        <span class="project-desc">An archive site cataloging a collection of chairs.</span>
      </div>

      <div class="project">
        <a class="project-title" href="https://brooklyndesignarchive.github.io/wigglythingy/ink-boil.html" target="_blank" rel="noopener">Wiggly Thingy</a>
        <span class="project-desc">An interactive ink boil animation experiment.</span>
      </div>
    </div>

    <footer>
      <a href="https://instagram.com/thegerardoguide" target="_blank" rel="noopener">@thegerardoguide</a>
    </footer>
  </div>
</body>
</html>
